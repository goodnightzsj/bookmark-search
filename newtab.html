<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新标签页 · 书签搜索</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body data-page="newtab" data-mood="day">
  <div class="nt-wallpaper" aria-hidden="true"></div>
  <div class="nt-progress-bar" id="ntProgress" aria-hidden="true"></div>

  <main class="nt-main">
    <header class="nt-hero">
      <div class="nt-greeting" id="ntGreeting">你好</div>
      <div class="nt-clock" id="ntClock">
        <span class="nt-time" id="ntTime">--:--</span>
      </div>
      <div class="nt-subtitle" id="ntSubtitle"></div>
      <div class="nt-date" id="ntDate"></div>
    </header>

    <div class="nt-search" role="search">
      <div class="nt-search-wrap">
        <svg class="nt-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        <input
          type="text"
          id="ntQuery"
          class="nt-search-input"
          placeholder="搜索书签 · 按 Enter 打开"
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
        <kbd class="nt-search-hint" id="ntHint">/ 聚焦</kbd>
      </div>
      <div class="nt-results" id="ntResults" role="listbox" aria-label="搜索结果"></div>
    </div>

    <section class="nt-dial" id="ntDial" aria-label="常用书签">
      <div class="nt-dial-title" id="ntDialTitle">常用书签</div>
      <div class="nt-dial-grid" id="ntDialGrid"></div>
    </section>
  </main>

  <footer class="nt-footer">
    <button type="button" class="nt-action-btn" id="ntOpenSettings" aria-label="扩展设置">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09A1.65 1.65 0 0015 4.6a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>设置</span>
    </button>
    <button type="button" class="nt-action-btn" id="ntOpenManager" aria-label="书签管理器">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
      <span>书签管理</span>
    </button>
  </footer>

  <script type="module" src="newtab.js"></script>
</body>
</html>
